name: Trigger auto deployment for atlasaiincubator

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ dev ]
    paths:
    - '**'
    - '.github/workflows/atlasaiincubator-AutoDeployTrigger-362ac716-89e4-49a4-b53c-81675f53b7c3.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ATLASAIINCUBATOR_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ATLASAIINCUBATOR_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ATLASAIINCUBATOR_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.ATLASAIINCUBATOR_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ATLASAIINCUBATOR_REGISTRY_PASSWORD }}
          containerAppName: atlasaiincubator
          resourceGroup: ATLAScontainer
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


