name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run lint || true
      - run: npm run test:unit -- --coverage

  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: atlas_user
          POSTGRES_PASSWORD: atlas_password
          POSTGRES_DB: atlas_test_db
        options: >-
          --health-cmd="pg_isready -U atlas_user -d atlas_test_db" 
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate prisma client and migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://atlas_user:atlas_password@localhost:5432/atlas_test_db
      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit
      - name: Lint
        run: npm run lint || true
      - name: Unit tests
        run: npm run test:cov
        env:
          JWT_SECRET: test_secret_please_change
          API_KEY: test_api_key

  e2e:
    runs-on: ubuntu-latest
    needs: [build-and-test-frontend, build-and-test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Start backend
        run: |
          cd backend
          npm ci
          npm run build
          JWT_SECRET=test_secret_please_change API_KEY=test_api_key npm run start:prod &
          sleep 5
      - name: Start frontend
        run: |
          npm run build
          npx vite preview --host 0.0.0.0 --port 5173 &
          sleep 3
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          VITE_BACKEND_URL: http://localhost:3000
