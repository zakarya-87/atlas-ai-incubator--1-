name: Deploy to Production

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: frontend
            context: .
            dockerfile: Dockerfile
          - name: backend
            context: ./backend
            dockerfile: Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_URL=https://api.example.com

  scan-images:
    runs-on: ubuntu-latest
    needs: [build-and-push-images]
    steps:
      - uses: actions/checkout@v4

      - name: Run Docker Scout on frontend image
        uses: docker/scout-action@v1
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}-frontend:main
          to: SARIF

      - name: Run Docker Scout on backend image
        uses: docker/scout-action@v1
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}-backend:main
          to: SARIF

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push-images, scan-images]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy (Placeholder)
        run: echo "🚀 Deploying to Production Infrastructure (e.g., AWS/Render)..."
