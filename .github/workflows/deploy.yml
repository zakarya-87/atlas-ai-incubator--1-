name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: atlasairegistrydev2026.azurecr.io
  BACKEND_IMAGE: atlas-backend
  WEBAPP_NAME: atlas-backend-app-dev26
  WEBAPP_RG: atlas-ai-webapp-rg
  FRONTEND_URL: https://atlas-backend-app-dev26.azurewebsites.net/api

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend (Static Web App)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ env.FRONTEND_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true

  deploy-backend:
    name: Build & Deploy Backend (Web App)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push backend image via ACR Tasks
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)
          az acr build \
            --registry atlasairegistrydev2026 \
            --image "${{ env.BACKEND_IMAGE }}:${TAG}" \
            --image "${{ env.BACKEND_IMAGE }}:latest" \
            --file backend/Dockerfile \
            ./backend

      - name: Restart Web App to pull new image
        run: |
          az webapp restart \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group ${{ env.WEBAPP_RG }}

      - name: Health check
        run: |
          sleep 30
          curl --fail https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/health
