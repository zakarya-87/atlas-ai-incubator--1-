# ========================================
# Docker Compose: Development Configuration
# Full-stack with hot reload and debugging
# ========================================

version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: atlas-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_password}
      POSTGRES_DB: ${POSTGRES_DB:-atlas_db}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-atlas_user} -d ${POSTGRES_DB:-atlas_db}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - atlas-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: atlas-redis-dev
    restart: unless-stopped
    ports:
      - ${REDIS_PORT:-6379}:6379
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - atlas-network

  # NestJS Backend - Development mode with hot reload
  atlas-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atlas-backend-dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      NODE_ENV: development
      PORT: 3000
      API_KEY: ${API_KEY:-test_key}
      JWT_SECRET: ${JWT_SECRET:-test_secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    ports:
      - ${BACKEND_PORT:-3000}:3000
      - 9229:9229
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount source for hot reload
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules
      - /app/dist
    command: npm run start:dev
    networks:
      - atlas-network

  # React Frontend - Development mode with hot reload
  atlas-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
    container_name: atlas-frontend-dev
    restart: unless-stopped
    ports:
      - ${FRONTEND_PORT:-5173}:5173
    depends_on:
      - atlas-backend
    volumes:
      # Mount source for Vite HMR
      - ./src:/app/src
      - ./components:/app/components
      - ./context:/app/context
      - ./hooks:/app/hooks
      - ./services:/app/services
      - ./public:/app/public
      - /app/node_modules
    environment:
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 5173
      VITE_HMR_PROTOCOL: ws
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
    networks:
      - atlas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  atlas-network:
    driver: bridge
