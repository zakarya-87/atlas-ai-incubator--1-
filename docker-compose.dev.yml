# Docker Compose for ATLAS AI Incubator Development Environment

services:
  atlas-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://atlas_user:atlas_password@postgres:5432/atlas_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis_secure_password_123
      - NODE_ENV=development
      - JWT_SECRET=dev_jwt_secret_change_in_production_123456789
      - JWT_EXPIRATION=7d
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:3000/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - atlas-network

  atlas-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '5173:5173'
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=${no_proxy}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      atlas-backend:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5173/' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - atlas-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U atlas_user -d atlas_db' ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  redis:
    image: redis:alpine
    command: redis-server --requirepass redis_secure_password_123
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', 'redis_secure_password_123', 'ping' ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

networks:
  atlas-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400


volumes:
  postgres_data:
  redis_data:
