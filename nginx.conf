server {
  listen       8080;
  server_name  _;

  # ─── Security Headers ──────────────────────────────────────────────────────
  # Defined once at server level; location blocks must NOT redefine these or
  # nginx will drop the server-level headers for that block.
  add_header X-Frame-Options              "SAMEORIGIN"                                                                           always;
  add_header X-Content-Type-Options       "nosniff"                                                                              always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin"                                                      always;
  add_header X-XSS-Protection            "1; mode=block"                                                                         always;
  add_header Content-Security-Policy     "default-src 'self'; connect-src 'self' http: https: ws: wss:; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.socket.io; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:" always;
  add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains"                                                   always;
  add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()"                                              always;

  # ─── Static Frontend ───────────────────────────────────────────────────────
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri /index.html;
    # Use expires directive (not add_header) to set cache control so the
    # server-level security headers are inherited without redefinition.
    expires 1h;
  }

  # ─── WebSocket Proxy ───────────────────────────────────────────────────────
  location /socket.io/ {
    proxy_pass http://atlas-backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # ─── Backend API Proxy ─────────────────────────────────────────────────────
  location /api/ {
    proxy_pass http://atlas-backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
