server {
  listen       8080;
  server_name  _;

  # ─── Security Headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options              "SAMEORIGIN"                                                                                                                                                         always;
  add_header X-Content-Type-Options       "nosniff"                                                                                                                                                            always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin"                                                                                                                                    always;
  add_header X-XSS-Protection            "1; mode=block"                                                                                                                                                       always;
  add_header Content-Security-Policy     "default-src 'self'; connect-src 'self' http: https:; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://aistudiocdn.com; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:" always;
  add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains"                                                                                                                                 always;
  add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()"                                                                                                                            always;

  # ─── Static Frontend ───────────────────────────────────────────────────────
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri /index.html;
    expires 1h;

    # Re-assert headers (required when this block overrides server-level headers)
    add_header Cache-Control             "public, max-age=3600"                                                                                                                                                 always;
    add_header X-Frame-Options           "SAMEORIGIN"                                                                                                                                                           always;
    add_header X-Content-Type-Options    "nosniff"                                                                                                                                                              always;
    add_header Content-Security-Policy   "default-src 'self'; connect-src 'self' http: https:; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://aistudiocdn.com; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                                                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                                                                                                                                        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"                                                                                                                                  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"                                                                                                                             always;
  }

  # ─── WebSocket Proxy ───────────────────────────────────────────────────────
  location /socket.io/ {
    # Backend service in Docker Compose network
    proxy_pass http://atlas-backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # ─── Backend API Proxy ─────────────────────────────────────────────────────
  location /api/ {
    # Backend service in Docker Compose network
    proxy_pass http://atlas-backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Re-assert security headers on proxied API responses
    add_header X-Frame-Options           "SAMEORIGIN"                                                                                                                                                           always;
    add_header X-Content-Type-Options    "nosniff"                                                                                                                                                              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                                                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                                                                                                                                        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"                                                                                                                                  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"                                                                                                                             always;
  }
}
