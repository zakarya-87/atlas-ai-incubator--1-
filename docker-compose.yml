services:
  atlas-backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://atlas_user:atlas_password@postgres:5432/atlas_db
      - API_KEY=${API_KEY:-test_key}
      - JWT_SECRET=${JWT_SECRET:-test_secret}
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - atlas-network
    restart: unless-stopped

  atlas-frontend:
    build: .
    ports:
      - '5173:5173'
    environment:
      - VITE_BACKEND_URL=http://localhost:3000
    depends_on:
      - atlas-backend
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - atlas-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas_user -d atlas_db']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  atlas-network:
