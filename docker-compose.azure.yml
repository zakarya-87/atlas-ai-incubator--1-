version: '3.8'

services:
  atlas-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: /api
    image: atlasairegistry.azurecr.io/atlas-frontend:latest
    ports:
      - "80:8080"
    depends_on:
      - atlas-backend
    links:
      - atlas-backend
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - atlas-network

  atlas-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: atlasairegistry.azurecr.io/atlas-backend:latest
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://atlas_user:${POSTGRES_PASSWORD}@postgres:5432/atlas_prod_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: "3000"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TLS: "false"
      FRONTEND_URL: https://atlas-ai-webapp.azurewebsites.net
    depends_on:
      - postgres
      - redis
    links:
      - postgres
      - redis
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - atlas-network

  postgres:
    image: atlasairegistry.azurecr.io/atlas-postgres:16-alpine
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: atlas_prod_db
    volumes:
      - postgres_prod_data_v5:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas_user -d atlas_prod_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - atlas-network

  redis:
    image: atlasairegistry.azurecr.io/atlas-redis:alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - atlas-network

volumes:
  postgres_prod_data_v5:

networks:
  atlas-network:
    driver: bridge
