<!doctype html>
<html>
  <head>
    <title>WebSocket Test</title>
    <script
      src="https://cdn.socket.io/4.5.4/socket.io.min.js"
      integrity="sha384-/KNQL8Nu5gCHLqwqfQjA689Hhoqgi2S84SNUxC3roTe4EhJ9AfLkp8QiQcU8AMzI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1>WebSocket Connection Test</h1>
    <p id="status">Connecting to WebSocket...</p>
    <ul id="logs"></ul>

    <script>
      const socket = io('http://localhost:3000', {
        transports: ['websocket', 'polling'],
        reconnectionAttempts: 5,
        reconnectionDelay: 1000,
      });

      function appendLog(text) {
        const li = document.createElement('li');
        li.textContent = text;
        document.getElementById('logs').appendChild(li);
      }

      socket.on('connect', () => {
        const status = document.getElementById('status');
        status.textContent = '✅ WebSocket connected successfully!';
        status.style.color = 'green';
        console.log('WebSocket connected:', socket.id);
      });

      socket.on('connect_error', (error) => {
        const status = document.getElementById('status');
        status.textContent = '❌ WebSocket connection failed: ' + error.message;
        status.style.color = 'red';
        console.error('WebSocket connection error:', error);
      });

      socket.on('disconnect', (reason) => {
        const status = document.getElementById('status');
        status.textContent = '⚠️ WebSocket disconnected: ' + reason;
        status.style.color = 'orange';
        console.log('WebSocket disconnected:', reason);
      });

      socket.on('agentLog', (log) => {
        appendLog('Received log: ' + JSON.stringify(log));
        console.log('Received agent log:', log);
      });

      setTimeout(() => {
        socket.emit('joinRoom', 'test-room');
        appendLog('Joined room: test-room');
      }, 2000);
    </script>
  </body>
</html>
