version: '3.8'

# Production-ready docker-compose file optimized for Azure deployment
# This configuration separates concerns for better scalability and management

services:
  atlas-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: atlas-backend:latest  # Explicitly tag for deployment
    expose:
      - "3000"  # Only expose internally, not to host
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://atlas_user:atlas_password@postgres:5432/atlas_prod_db}
      - API_KEY=${API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - atlas-network
    # Limit resources for predictable performance in cloud environments
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  atlas-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: atlas-frontend:latest  # Explicitly tag for deployment
    expose:
      - "80"  # Only expose internally, not to host
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://atlas-backend:3000}
    depends_on:
      - atlas-backend
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - atlas-network
    # Limit resources for predictable performance in cloud environments
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-atlas_prod_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      # Mount custom PostgreSQL configuration for production
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-atlas_user} -d ${POSTGRES_DB:-atlas_prod_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - atlas-network
    # Limit resources for predictable performance in cloud environments
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password_123}
    environment:
      REDIS_REPLICATION_MODE: master
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secure_password_123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - atlas-network
    # Limit resources for predictable performance in cloud environments
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

volumes:
  postgres_prod_data:
    driver: local
  redis_data:
    driver: local

networks:
  atlas-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400